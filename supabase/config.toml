project_id = "ryetluoijeklyyyxdgqh"

# qb-oauth-callback receives Intuit's browser redirect with no Supabase JWT.
# Validate the OAuth `state` server-side instead.
[functions.qb-oauth-callback]
verify_jwt = false

# quickbooks-webhook is called by Intuit servers (no Supabase JWT).
# Authenticity is enforced via HMAC signature verification in code.
[functions.quickbooks-webhook]
verify_jwt = false

# Admin-only AI draft helpers. JWT verification blocks anonymous requests
# before the function runs; each function also verifies public.is_admin().
[functions.persona-ai-seed]
verify_jwt = true

[functions.journey-ai-seed]
verify_jwt = true

[functions.process-ai-seed]
verify_jwt = true

[functions.report-ai-assist]
verify_jwt = true

[functions.ai-readiness-status]
verify_jwt = true

[functions.admin-account-links]
verify_jwt = true

# Public payments endpoints. The Stripe Checkout flow is callable
# anonymously from the public /diagnostic-apply page; the webhook is
# called by Stripe with no Supabase JWT. Both validate inputs and
# signatures in code.
[functions.create-diagnostic-checkout]
verify_jwt = false

[functions.payments-webhook]
verify_jwt = false

# Admin-only invite minting. JWT verification + in-code admin check.
[functions.admin-mint-portal-invite]
verify_jwt = true

# Public-facing notify endpoint: callable anonymously, but always re-verifies
# the underlying record state and only sends emails for allow-listed events
# so the caller cannot trigger arbitrary admin emails.
[functions.notify-admin-event]
verify_jwt = false

# P93-L scorecard follow-up dispatcher: invoked anonymously by the public
# scorecard form right after a successful scorecard_runs insert. The function
# re-reads the row server-side and only sends the allow-listed admin alert
# and consent-gated lead follow-up email — callers cannot trigger arbitrary
# email sends.
[functions.scorecard-followup]
verify_jwt = false

[functions.admin-resend-scorecard-followup]
verify_jwt = false

# P96C — Operational Friction Scan lead follow-up dispatcher. Anonymous-
# callable: the public Scan completion form invokes it with a scan_leads
# row id. The function re-reads the row server-side and only sends the
# admin alert + consent-gated lead follow-up email.
[functions.scan-followup]
verify_jwt = false

# P93E-E2D scorecard answer classifier: invoked anonymously by the public
# scorecard form. The function only maps owner text to fixed rubric option
# ids; it never returns or changes scores. All inserts use the service-role
# client into an admin-read-only table.
[functions.scorecard-classify]
verify_jwt = false

# P94A role-aware guide bots. The public guide route must be callable without
# a Supabase session, then the function itself gates client/admin context
# before adding any account data. Image/document extraction is portal/admin
# only and requires JWT verification before it runs.
[functions.rgs-guide-bot]
verify_jwt = false

[functions.rgs-image-input-assist]
verify_jwt = true

[functions.generate-campaign-assets]
verify_jwt = true
