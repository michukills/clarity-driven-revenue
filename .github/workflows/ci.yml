name: CI

# P30 — Launch-safe gate. Runs the security regression suites,
# the full vitest suite, lint, typecheck, and a production build
# on every push to main and every pull request. A failure here
# blocks the change from shipping.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Security regression tests
        run: npm run test:security
      - name: Full test suite
        run: npm test
      - name: Build
        run: npm run build